
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>zhimaxu</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Font Awesome -->
  <script src="https://kit.fontawesome.com/73065ac5d9.js" crossorigin="anonymous"></script>
    <!-- <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.2.0/css/all.min.css"> -->
    <!-- Google Fonts: Nunito for ACG feel -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Nunito', sans-serif;
            background-color: #fdf2f8; /* Light pink background */
            background-image:
                radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%),
                radial-gradient(at 50% 0%, hsla(225,39%,30%,1) 0, transparent 50%),
                radial-gradient(at 100% 0%, hsla(339,49%,30%,1) 0, transparent 50%);
            background-size: cover;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.1);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(236, 72, 153, 0.5);
            border-radius: 4px;
        }

        /* Gallery Grid */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .gallery-item {
            border-radius: 1.5rem;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            border: 4px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            aspect-ratio: 2 / 1;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .gallery-item:hover {
            transform: translateY(-8px);
            box-shadow: 0 30px 60px rgba(236, 72, 153, 0.4);
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .gallery-item:hover img {
            transform: scale(1.05);
        }

        .gallery-item .slide-content {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 1.5rem;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
            color: white;
            z-index: 10;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .gallery-item:hover .slide-content {
            opacity: 1;
        }

        /* Animations */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .gallery-item {
            animation: fadeInUp 0.6s ease forwards;
        }
        .gallery-item:nth-child(1) { animation-delay: 0.1s; }
        .gallery-item:nth-child(2) { animation-delay: 0.3s; }
        .gallery-item:nth-child(3) { animation-delay: 0.5s; }

        /* Decorative Elements */
        .decoration-circle {
            position: absolute;
            border-radius: 50%;
            background: linear-gradient(45deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
            opacity: 0.6;
            filter: blur(40px);
            z-index: -1;
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center p-4">

    <!-- Background Decorations -->
    <div class="decoration-circle w-64 h-64 top-10 left-10 animate-pulse"></div>
    <div class="decoration-circle w-96 h-96 bottom-10 right-10 bg-blue-300 animate-pulse" style="animation-duration: 3s;"></div>

    <!-- Header -->
    <header class="text-center mb-8 z-10">
        <h1 class="text-4xl md:text-6xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-pink-500 via-purple-500 to-indigo-500 drop-shadow-lg">
            <i class="fas fa-wand-magic-sparkles text-yellow-300 mr-2"></i> Welcome
        </h1>
        <p class="text-white mt-2 text-lg opacity-90 font-semibold tracking-wide">欢迎来到我的小站~</p>
    </header>

    <!-- Main Gallery Component -->
    <main class="w-full max-w-6xl z-10 px-2">
        <div class="gallery-grid">

            <!-- Image 1 -->
            <div class="gallery-item" onclick="window.open('https://blog.19930618.xyz/', '_blank')">
                <img src="https://image.thum.io/get/maxAge/12/https://blog.19930618.xyz/" alt="个人博客缩略图">
                <div class="slide-content">
                    <h2 class="text-xl font-bold mb-1"><i class="fa-solid fa-blog mr-2"></i>我的博客</h2>
                    <p class="text-sm text-gray-200">记录技术笔记与生活感悟</p>
                </div>
            </div>

            <!-- Image 2 -->
            <div class="gallery-item" onclick="window.open('https://example.com/manga', '_blank')">
                <img src="2.png" alt="oni-mod under development">
                <div class="slide-content">
                    <h2 class="text-xl font-bold mb-1"><i class="fa-solid fa-heart mr-2"></i>oni-mod</h2>
                    <p class="text-sm text-gray-200">缺氧Mod</p>
                </div>
            </div>

            <!-- Image 3 -->
            <div class="gallery-item" onclick="window.open('https://example.com/game', '_blank')">
                <img src="3.png" alt="ai-customer-service under development">
                <div class="slide-content">
                    <h2 class="text-xl font-bold mb-1"><i class="fa-solid fa-robot mr-2"></i>ai-customer-service</h2>
                    <p class="text-sm text-gray-200">智能客服</p>
                </div>
            </div>
            <!-- Image 4 -->
            <div class="gallery-item" onclick="window.open('https://19930618.xyz/resume.html', '_blank')">
                <!-- <img src="https://image.thum.io/get/maxAge/12/https://blog.19930618.xyz/resume.html" alt="resume page"> -->
                <div class="slide-content">
                    <h2 class="text-xl font-bold mb-1"><i class="fa-solid fa-file mr-2"></i>resume</h2>
                    <p class="text-sm text-gray-200">简历</p>
                </div>
            </div>

        </div>
    </main>

    <!-- Footer Info -->
    <footer class="mt-12 text-center z-10">
        <p class="text-amber-300 text-sm font-bold tracking-wide">&copy; 2026 <a href="https://github.com/zhimaxu" class="text-amber-200 hover:text-pink-300 transition-colors duration-300"><i class="fab fa-github"></i>zhimaxu</a> · All rights reserved.   <a href="https://beian.miit.gov.cn/" target="_blank" class="text-amber-200 hover:text-pink-300 transition-colors duration-300">苏ICP备2023022790号-1</a></p>
    </footer>

</body>
</html>
