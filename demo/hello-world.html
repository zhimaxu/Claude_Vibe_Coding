<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World - 欢迎页面</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            text-align: center;
            color: white;
            padding: 40px;
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }

        h1 {
            font-size: 4rem;
            margin-bottom: 16px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        p {
            font-size: 1.5rem;
            opacity: 0.9;
        }

        .button-container {
            margin-top: 32px;
        }

        button {
            padding: 14px 36px;
            font-size: 1.1rem;
            background-color: #ff6b6b;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.3);
        }

        button:hover {
            transform: translateY(-2px);
            background-color: #ff5252;
            box-shadow: 0 6px 20px rgba(255, 82, 82, 0.4);
        }

        button:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Hello World!</h1>
        <p id="date"></p>
        <div class="button-container">
            <button onclick="printHello()">打印问候语 🌟</button>
        </div>
    </div>

    <script>
        // 显示当前日期和时间
        function displayDate() {
            const now = new Date();
            const dateStr = now.toLocaleDateString('zh-CN', {
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            });
            document.getElementById('date').textContent = dateStr;
        }

        // 打印问候语到控制台和页面（可选）
        function printHello() {
            console.log('👋 Hello World!');

            let message = `今天是 ${new Date().toLocaleDateString()} \n`;
            window.alert(`✨ Welcome to your first web page! 🌟`);
        }

        // 初始化显示日期
        displayDate();

        // 每秒更新一次时间（可选：如果需要实时时钟）
        setInterval(displayDate, 1000 * 60); // 每分钟的分钟数，这里设置为每小时更新时间以避免过度干扰
    </script>
</body>
</html>
